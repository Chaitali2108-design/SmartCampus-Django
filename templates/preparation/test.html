{% extends "base.html" %} {% block content %}

<div class="min-h-screen bg-[#140F1F] text-white">
  <div class="max-w-[1700px] mx-auto px-8 py-8">
    <!-- Header -->

    <div class="flex items-center justify-between mb-8">
      <div>
        <h1 class="text-3xl font-bold">Aptitude Assessment</h1>

        <p class="text-gray-400 mt-2">
          Read every question carefully before answering.
        </p>
      </div>

      <div class="flex items-center gap-4">
        <div
          class="rounded-2xl border border-pink-500/20 bg-pink-500/10 px-6 py-3"
        >
          <span class="text-sm text-gray-300"> Time Left </span>

          <h2 class="text-2xl font-bold text-pink-400">30:00</h2>
        </div>

        <button
          class="px-6 py-3 rounded-2xl bg-red-500 hover:bg-red-400 transition"
        >
          Submit Test
        </button>
      </div>
    </div>

    <!-- Layout -->

    <div class="grid grid-cols-12 gap-8">
      <!-- Question Area -->

      <div
        class="col-span-8 rounded-[32px] border border-white/10 bg-white/5 backdrop-blur-xl p-8"
      >
        <div class="flex items-center justify-between">
          <span
            id="questionNumber"
            class="px-4 py-2 rounded-full bg-pink-500/10 text-pink-300"
          >
          </span>

          <span id="progressText" class="text-gray-400"> 16% Completed </span>
        </div>

        <!-- Progress -->

        <div class="h-3 rounded-full bg-white/10 overflow-hidden mt-6 mb-10">
          <div
            id="progressBar"
            class="h-full w-[16%] bg-gradient-to-r from-pink-500 to-violet-500"
          ></div>
        </div>

        <!-- Question -->

        <h2
          id="questionText"
          class="text-3xl font-semibold leading-relaxed"
        ></h2>

        <!-- Options -->

        <div class="mt-10 space-y-5">
          <label
            class="optionCard group flex items-center gap-5 rounded-2xl border border-white/10 bg-white/5 p-5 cursor-pointer hover:border-pink-500/30 transition"
          >
            <input type="radio" name="answer" class="hidden optionInput" />

            <div
              class="w-6 h-6 rounded-full border-2 border-gray-500 group-hover:border-pink-400"
            ></div>

            <span class="text-lg optionText"></span>
          </label>

          <label
            class="optionCard group flex items-center gap-5 rounded-2xl border border-white/10 bg-white/5 p-5 cursor-pointer hover:border-pink-500/30 transition"
          >
            <input type="radio" name="answer" class="hidden optionInput" />

            <div
              class="w-6 h-6 rounded-full border-2 border-gray-500 group-hover:border-pink-400"
            ></div>

            <span class="text-lg optionText"></span>
          </label>

          <label
            class="optionCard group flex items-center gap-5 rounded-2xl border border-white/10 bg-white/5 p-5 cursor-pointer hover:border-pink-500/30 transition"
          >
            <input type="radio" name="answer" class="hidden optionInput" />

            <div
              class="w-6 h-6 rounded-full border-2 border-gray-500 group-hover:border-pink-400"
            ></div>

            <span class="text-lg optionText"></span>
          </label>

          <label
            class="optionCard group flex items-center gap-5 rounded-2xl border border-white/10 bg-white/5 p-5 cursor-pointer hover:border-pink-500/30 transition"
          >
            <input type="radio" name="answer" class="hidden optionInput" />

            <div
              class="w-6 h-6 rounded-full border-2 border-gray-500 group-hover:border-pink-400"
            ></div>

            <span class="text-lg optionText"></span>
          </label>
        </div>

        <!-- Footer -->

        <div
          class="flex justify-between items-center mt-14 pt-8 border-t border-white/10"
        >
          <button
            id="prevBtn"
            class="px-6 py-3 rounded-2xl border border-white/10 bg-white/5 hover:bg-white/10"
          >
            Previous
          </button>

          <button
            id="nextBtn"
            class="px-8 py-3 rounded-2xl bg-pink-500 hover:bg-pink-400"
          >
            Next Question
          </button>
        </div>
      </div>

      <!-- Sidebar -->

      <div
        class="col-span-4 rounded-[32px] border border-white/10 bg-white/5 backdrop-blur-xl p-8"
      >
        <h3 class="text-xl font-semibold mb-8">Question Palette</h3>

        <div id="questionPalette" class="grid grid-cols-5 gap-3"></div>

        <div class="mt-10">
          <h3 class="text-xl font-semibold mb-6">Test Summary</h3>

          <div class="space-y-5">
            <div class="flex justify-between">
              <span class="text-gray-400"> Answered </span>

              <span id="answeredCount" class="text-green-400"> 12 </span>
            </div>

            <div class="flex justify-between">
              <span class="text-gray-400"> Review </span>

              <span id="reviewCount" class="text-yellow-400"> 3 </span>
            </div>

            <div class="flex justify-between">
              <span class="text-gray-400"> Remaining </span>

              <span id="remainingCount" class="text-red-400"> 10 </span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  const testType = "{{ test_type }}";
</script>

<script>
  let questions = [];

  const questionText = document.getElementById("questionText");
  const questionNumber = document.getElementById("questionNumber");
  const progressBar = document.getElementById("progressBar");
  const progressText = document.getElementById("progressText");

  const optionTexts = document.querySelectorAll(".optionText");

  const optionInputs = document.querySelectorAll(".optionInput");

  const optionCards = document.querySelectorAll(".optionCard");

  let currentQuestion = 0;

  const nextBtn = document.getElementById("nextBtn");
  const prevBtn = document.getElementById("prevBtn");
  const palette = document.getElementById("questionPalette");

  function renderQuestion() {
    questions[currentQuestion].visited = true;
    const q = questions[currentQuestion];

    const percentage = Math.round(
      ((currentQuestion + 1) / questions.length) * 100,
    );

    progressText.textContent = `${percentage}% Completed`;
    progressBar.style.width = `${percentage}%`;

    questionText.innerHTML = q.question;
    questionNumber.textContent = `Question ${currentQuestion + 1} of ${questions.length}`;
    optionTexts.forEach((option, index) => {
      option.innerHTML = q.options[index];

      optionInputs[index].checked = q.answer === index;
    });
    updateOptionStyles();
    updatePalette();
    updateSummary();
  }

  optionInputs.forEach((radio, index) => {
    radio.addEventListener("change", () => {
      questions[currentQuestion].answer = index;
    });
  });

  nextBtn.onclick = () => {
    if (questions[currentQuestion].answer === null) {
      questions[currentQuestion].review = true;
    } else {
      questions[currentQuestion].review = false;
    }

    updateSummary();
    updatePalette();

    if (currentQuestion < questions.length - 1) {
      currentQuestion++;
      renderQuestion();
    }
  };

  prevBtn.onclick = () => {
    if (currentQuestion > 0) {
      currentQuestion--;

      renderQuestion();
    }
  };

  optionCards.forEach((card, index) => {
    card.addEventListener("click", () => {
      questions[currentQuestion].answer = index;
      questions[currentQuestion].review = false;

      optionInputs[index].checked = true;

      updateOptionStyles();
      updatePalette();
      updateSummary();
    });
  });

  function updateOptionStyles() {
    optionCards.forEach((card, index) => {
      if (questions[currentQuestion].answer === index) {
        card.classList.remove("border-white/10", "bg-white/5");

        card.classList.add(
          "border-sky-400",
          "bg-sky-500/20",
          "shadow-lg",
          "shadow-sky-500/20",
        );
      } else {
        card.classList.remove(
          "border-sky-400",
          "bg-sky-500/20",
          "shadow-lg",
          "shadow-sky-500/20",
        );

        card.classList.add("border-white/10", "bg-white/5");
      }
    });
  }

  function createPalette() {
    palette.innerHTML = "";

    questions.forEach((q, index) => {
      const btn = document.createElement("button");

      btn.innerHTML = index + 1;

      btn.className =
        "paletteBtn aspect-square rounded-xl border transition-all duration-300";

      btn.onclick = () => {
        currentQuestion = index;
        renderQuestion();
      };

      palette.appendChild(btn);
    });
  }

  function updatePalette() {
    const buttons = document.querySelectorAll(".paletteBtn");

    buttons.forEach((btn, index) => {
      btn.className =
        "paletteBtn aspect-square rounded-xl border transition-all duration-300";

      if (index === currentQuestion) {
        btn.classList.add("bg-pink-500", "border-pink-500", "text-white");
      } else if (questions[index].answer !== null) {
        btn.classList.add("bg-sky-500/20", "border-sky-400", "text-sky-300");
      } else if (questions[index].review) {
        btn.classList.add(
          "bg-yellow-500/20",
          "border-yellow-400",
          "text-yellow-300",
        );
      } else if (questions[index].visited) {
        btn.classList.add("bg-white/10", "border-white/20");
      } else {
        btn.classList.add("bg-white/5", "border-white/10");
      }
    });
  }

  function updateSummary() {
    const answered = questions.filter((q) => q.answer !== null).length;

    const review = questions.filter((q) => q.review).length;

    const remaining = questions.length - answered;

    document.getElementById("answeredCount").textContent = answered;
    document.getElementById("reviewCount").textContent = review;
    document.getElementById("remainingCount").textContent = remaining;
  }

  async function loadQuestions() {
    const response = await fetch(`/static/data/${testType}.json`);

    questions = await response.json();

    questions.forEach((q) => {
      q.answer = null;
      q.review = false;
      q.visited = false;
    });

    createPalette();
    renderQuestion();
  }

  loadQuestions();
</script>

{% endblock %}
