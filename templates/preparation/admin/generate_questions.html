{% extends "base.html" %} {% block content %}

<div class="min-h-screen bg-[#140F1F] text-white">
  <div class="max-w-3xl mx-auto py-16 px-8">
    <div
      class="rounded-[32px] border border-white/10 bg-white/5 backdrop-blur-xl p-10"
    >
      <h1 class="text-4xl font-bold mb-2">AI Question Generator</h1>

      <p class="text-gray-400 mb-10">
        Generate interview and assessment questions using AI.
      </p>

      <form method="POST">
        {% csrf_token %}

        <div class="space-y-7">
          <div>
            <label class="block mb-3 text-gray-300"> Test Type </label>

            <select
              name="test_type"
              class="w-full rounded-2xl bg-white/5 border border-white/10 p-4"
            >
              <option value="aptitude">Aptitude</option>
              <option value="technical">Technical</option>
              <option value="coding">Coding</option>
              <option value="communication">Communication</option>
              <option value="hr">HR</option>
            </select>
          </div>

          <div>
            <label class="block mb-3 text-gray-300"> Difficulty </label>

            <select
              name="difficulty"
              class="w-full rounded-2xl bg-white/5 border border-white/10 p-4"
            >
              <option value="easy">Easy</option>
              <option value="medium">Medium</option>
              <option value="hard">Hard</option>
            </select>
          </div>

          <div>
            <label class="block mb-3 text-gray-300">
              Number of Questions
            </label>

            <input
              type="number"
              name="count"
              value="50"
              min="1"
              max="300"
              class="w-full rounded-2xl bg-white/5 border border-white/10 p-4"
            />
          </div>

          <button
            class="w-full py-4 rounded-2xl bg-pink-500 hover:bg-pink-400 text-lg font-semibold transition"
          >
            Generate Questions
          </button>
        </div>
      </form>
    </div>
  </div>
</div>

{% endblock %}
