{% extends "base.html" %} {% block content %}

<div class="min-h-screen bg-[#140F1F] text-white">
  <div class="max-w-6xl mx-auto px-8 py-10">
    <!-- HEADER -->

    <div class="flex justify-between items-center mb-10">
      <div>
        <h1 class="text-4xl font-bold">Communication Assessment</h1>

        <p class="text-gray-400 mt-2">
          Improve your workplace communication skills
        </p>
      </div>

      <div class="text-right">
        <p class="text-gray-400 text-sm">Time Remaining</p>

        <h2 id="timer" class="text-3xl font-bold text-pink-400">60:00</h2>
      </div>
    </div>

    <!-- QUESTION CARD -->

    <div class="bg-white/5 border border-white/10 rounded-3xl p-8">
      <div class="flex justify-between mb-6">
        <span
          id="section"
          class="px-4 py-2 rounded-full bg-pink-500/20 text-pink-300"
        >
          Grammar MCQ
        </span>

        <span id="marks" class="text-gray-400"> 2 Marks </span>
      </div>

      <h2 id="question" class="text-2xl font-semibold mb-8">
        Question will appear here
      </h2>

      <div id="options" class="space-y-4"></div>

      <button
        id="nextBtn"
        class="mt-10 px-8 py-3 rounded-xl bg-pink-500 hover:bg-pink-400"
      >
        Next
      </button>
    </div>
  </div>
</div>

<script>


    const questions = [

    {% for q in questions %}

    {

    id: {{q.id}},

    type:"{{q.question_type}}",

    title:"{{q.title|escapejs}}",

    question:`{{q.question|escapejs}}`,

    marks:{{q.marks}},

    option_a:`{{q.option_a|escapejs}}`,

    option_b:`{{q.option_b|escapejs}}`,

    option_c:`{{q.option_c|escapejs}}`,

    option_d:`{{q.option_d|escapejs}}`

    },

    {% endfor %}

    ];


    console.log(questions);

    let currentQuestion = 0;

  let answers = [];

  let selectedAnswer = null;
</script>

{% endblock %}
