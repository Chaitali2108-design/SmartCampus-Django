<!doctype html>
<html>
  <head>
    <title>SmartCampus Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body
    class="min-h-screen flex items-center justify-center bg-gradient-to-br from-slate-950 via-black to-slate-900 px-5"
  >
    <form
      method="post"
      class="w-full max-w-md bg-white/10 backdrop-blur-2xl border border-white/10 rounded-3xl p-10"
    >
      {% csrf_token %}

      <h1 class="text-4xl font-black text-white text-center mb-8">
        Welcome Back
      </h1>

      <div class="space-y-5">
        <div>
          <label class="block text-slate-300 mb-2"> Username </label>
          {{ form.username }}
        </div>

        <div>
          <label class="block text-slate-300 mb-2"> Password </label>
          {{ form.password }}
        </div>

        <button
          type="submit"
          class="w-full py-4 rounded-2xl bg-gradient-to-r from-cyan-500 to-purple-600 text-white font-bold hover:scale-105 transition-all duration-300"
        >
          Login
        </button>

        <div class="flex justify-between items-center text-sm mt-2">
          <a href="#" class="text-cyan-400 hover:text-cyan-300">
            Forgot Password?
          </a>

          <a
            href="{% url 'signup' %}"
            class="text-purple-400 hover:text-purple-300"
          >
            Create Account
          </a>
        </div>
      </div>
    </form>
  </body>
</html>
