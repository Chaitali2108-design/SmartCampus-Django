<!doctype html>
<html>
  <head>
    <title>Create Account</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body
    class="min-h-screen flex items-center justify-center bg-gradient-to-br from-slate-950 via-black to-slate-900 px-5"
  >
    <form
      method="post"
      class="w-full max-w-md bg-white/10 backdrop-blur-2xl border border-white/10 rounded-3xl p-10"
    >
      {% csrf_token %}

      <h1 class="text-4xl font-black text-white text-center mb-8">
        Create Account
      </h1>

      <div class="space-y-5">
        {{ form.username }} {{ form.email }} {{ form.password1 }}
        {{form.password2 }}

        <button
          type="submit"
          class="w-full py-4 rounded-2xl bg-gradient-to-r from-purple-500 to-pink-600 text-white font-bold hover:scale-105 transition-all duration-300"
        >
          Create Account
        </button>

        <div class="text-center text-sm">
          <a href="{% url 'login' %}" class="text-cyan-400 hover:text-cyan-300">
            Already have an account? Login
          </a>
        </div>
      </div>
    </form>
  </body>
</html>
