<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SmartCampus CareerHub AI</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
      @keyframes popup {
        from {
          opacity: 0;
          transform: translateY(25px) scale(0.96);
        }

        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }

      .animate-popup {
        opacity: 0;
        animation: popup 0.7s ease-out forwards;
      }

      .delay-1 {
        animation-delay: 0.1s;
      }

      .delay-2 {
        animation-delay: 0.2s;
      }

      .delay-3 {
        animation-delay: 0.3s;
      }

      .delay-4 {
        animation-delay: 0.4s;
      }

      .delay-5 {
        animation-delay: 0.5s;
      }

      .delay-6 {
        animation-delay: 0.6s;
      }
    </style>
  </head>

  <body class="bg-[#020617] text-white overflow-x-hidden">
    <!-- Background Glow -->
    <div
      class="fixed top-0 left-0 w-[500px] h-[500px] bg-cyan-500/10 blur-[150px] pointer-events-none"
    ></div>

    <div
      class="fixed bottom-0 right-0 w-[500px] h-[500px] bg-purple-500/10 blur-[150px] pointer-events-none"
    ></div>

    <div class="flex">
      {% include 'components/sidebar.html' %}

      <div class="flex-1 pt-16 lg:ml-72 lg:pt-0">
        {% include 'components/navbar.html' %}

        <main class="p-4 sm:p-6 lg:p-8">
          {% block content %} {% endblock %}
        </main>
      </div>
    </div>

    <script>
      lucide.createIcons();
    </script>
  </body>
</html>
