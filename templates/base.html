<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SmartCampus CareerHub AI</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
      @keyframes popup {
        from {
          opacity: 0;
          transform: translateY(25px) scale(0.96);
        }

        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }

      .animate-popup {
        opacity: 0;
        animation: popup 0.7s ease-out forwards;
      }

      .delay-1 {
        animation-delay: 0.1s;
      }

      .delay-2 {
        animation-delay: 0.2s;
      }

      .delay-3 {
        animation-delay: 0.3s;
      }

      .delay-4 {
        animation-delay: 0.4s;
      }

      .delay-5 {
        animation-delay: 0.5s;
      }

      .delay-6 {
        animation-delay: 0.6s;
      }
    </style>
    <style>
.profile-input{
    width:100%;
    background:rgba(255,255,255,.04);
    border:1px solid rgba(255,255,255,.1);
    border-radius:1rem;
    padding:1rem 1.25rem;
    color:white;
    outline:none;
}

.profile-input::placeholder{
    color:rgba(255,255,255,.45);
}

.profile-input:focus{
    border-color:#06b6d4;
}
</style>
  </head>

  <body class="bg-gradient-to-br from-[#140f1f] via-[#251537] to-[#3b1d2e] text-white overflow-x-hidden">
      <div
        class="absolute top-20 left-20 w-[500px] h-[500px] rounded-full bg-cyan-500/10 blur-[180px] animate-pulse"
      ></div>

      <div
        class="absolute bottom-10 right-10 w-[500px] h-[500px] rounded-full bg-pink-500/10 blur-[180px] animate-pulse"
      ></div>
    </div>

    <!-- Background Glow -->
    <div
      class="absolute top-0 left-0 w-[500px] h-[500px] bg-fuchsia-600/5 blur-[140px] rounded-full"
    ></div>

    <div
      class="absolute bottom-0 right-0 w-[500px] h-[500px] bg-cyan-500/5 blur-[140px] rounded-full"
    ></div>

    <div
      class="absolute top-[40%] left-[40%] w-[300px] h-[300px] bg-purple-500/5 blur-[120px] rounded-full"
    ></div>

    <div class="flex">
      {% include 'components/sidebar.html' %}

     <div class="flex-1 min-w-0 pt-16 lg:ml-72 lg:pt-0">
          {% include 'components/navbar.html' %}

        <main class="p-4 sm:p-6 lg:p-8">
          {% block content %} {% endblock %}
        </main>
      </div>
    </div>

   {% if messages %}
<div
    id="alert-container"
    class="fixed top-6 left-1/2 -translate-x-1/2 z-[9999] space-y-3"
>
    {% for message in messages %}
    <div
        class="
        min-w-[450px]
        px-8 py-5
        rounded-2xl
        text-center
        text-lg
        font-semibold
        text-white
        backdrop-blur-xl
        border border-white/10
        shadow-xl
        {% if message.tags == 'success' %}
            bg-green-500/20
        {% else %}
            bg-yellow-500/20
        {% endif %}
        "
    >
        {{ message }}
    </div>
    {% endfor %}
</div>
{% endif %}

    <script>
      lucide.createIcons();
    </script>

    <script>
setTimeout(() => {
    const alerts = document.getElementById("alert-container");

    if (alerts) {
        alerts.style.opacity = "0";
        alerts.style.transform = "translateX(-50%) translateY(-20px)";
        alerts.style.transition = "all 0.5s ease";

        setTimeout(() => alerts.remove(), 500);
    }
}, 3000);
</script>
  </body>
</html>
