<!doctype html>
<html>
  <head>
    <title>SmartCampus CareerHub AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body
    class="min-h-screen bg-gradient-to-br from-slate-950 via-black to-slate-900 text-white"
  >
    <div class="min-h-screen flex items-center justify-center px-6">
      <div class="max-w-6xl w-full grid lg:grid-cols-2 gap-10 items-center">
        <!-- Left Section -->
        <div>
          <h1
            class="text-5xl lg:text-6xl font-black leading-tight bg-gradient-to-r from-cyan-400 to-purple-500 bg-clip-text text-transparent"
          >
            SmartCampus CareerHub AI
          </h1>

          <p class="text-slate-300 text-lg lg:text-xl mt-6 leading-relaxed">
            AI-powered internship, placement, and smart college management
            platform designed for modern campuses.
          </p>

          <div class="flex flex-wrap gap-5 mt-10">
            <a
              href="/accounts/login/"
              class="bg-gradient-to-r from-cyan-500 to-blue-600 px-8 py-4 rounded-2xl font-bold hover:scale-105 transition-all duration-300"
            >
              Login
            </a>

            <a
              href="/accounts/signup/"
              class="bg-gradient-to-r from-purple-500 to-pink-600 px-8 py-4 rounded-2xl font-bold hover:scale-105 transition-all duration-300"
            >
              Create Account
            </a>
          </div>
        </div>

        <!-- Right Section -->
        <div
          class="bg-white/10 border border-white/10 backdrop-blur-2xl rounded-[40px] p-10"
        >
          <h2 class="text-3xl font-bold mb-8">Platform Features</h2>

          <div class="space-y-5">
            <div
              class="bg-black/30 rounded-2xl p-5 hover:bg-black/40 transition-all"
            >
              ✔ AI Career Assistant
            </div>

            <div
              class="bg-black/30 rounded-2xl p-5 hover:bg-black/40 transition-all"
            >
              ✔ Placement Analytics
            </div>

            <div
              class="bg-black/30 rounded-2xl p-5 hover:bg-black/40 transition-all"
            >
              ✔ Internship Tracking
            </div>

            <div
              class="bg-black/30 rounded-2xl p-5 hover:bg-black/40 transition-all"
            >
              ✔ Resume Builder
            </div>

            <div
              class="bg-black/30 rounded-2xl p-5 hover:bg-black/40 transition-all"
            >
              ✔ Smart Attendance
            </div>

            <div
              class="bg-black/30 rounded-2xl p-5 hover:bg-black/40 transition-all"
            >
              ✔ Student Dashboard
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
