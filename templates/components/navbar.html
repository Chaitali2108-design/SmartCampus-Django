<nav
  class="mx-4 mt-4 flex items-center justify-between rounded-3xl border border-white/10 bg-white/10 px-5 py-4 text-white backdrop-blur-xl sm:mx-6 lg:mx-8 lg:mt-5 lg:px-6 lg:py-5"
>
  <div class="flex items-center gap-4">
    <div
      id="navbar-user-avatar"
      class="flex h-11 w-11 items-center justify-center rounded-full bg-gradient-to-r from-red-500 to-pink-600 text-lg font-bold text-white"
    >
      {% if request.user.is_authenticated %}
        {% firstof request.user.email|first request.user.username|first "U" as user_initial %}
        {{ user_initial|upper }}
      {% else %}
        U
      {% endif %}
    </div>

    <div>
      <h1 class="text-2xl font-bold lg:text-3xl">SmartCampus CareerHub AI</h1>
      <p class="mt-1 text-sm text-slate-300 lg:text-base">
        Intelligent Internship &amp; Placement Platform
      </p>
    </div>
  </div>

  <button
    id="logout-button"
    type="button"
    class="rounded-2xl bg-gradient-to-r from-red-500 to-pink-600 px-5 py-3 font-bold transition-all hover:scale-105 lg:px-6"
  >
    Logout
  </button>
</nav>

<script>
  document.addEventListener("DOMContentLoaded", function () {
    const avatar = document.getElementById("navbar-user-avatar");
    const logoutButton = document.getElementById("logout-button");

    try {
      const storedUser = JSON.parse(localStorage.getItem("user"));
      const email = storedUser && storedUser.email ? storedUser.email : "";

      if (email && avatar) {
        avatar.textContent = email.charAt(0).toUpperCase();
      }
    } catch (error) {
      if (avatar && !avatar.textContent.trim()) {
        avatar.textContent = "U";
      }
    }

    logoutButton.addEventListener("click", function () {
      localStorage.removeItem("token");
      localStorage.removeItem("user");
      window.location.href = "/login/";
    });
  });
</script>
